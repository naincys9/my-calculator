<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live INR-IDR Formula Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .calculator { max-width: 400px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        input[readonly] { background-color: #e9ecef; color: #495057; cursor: not-allowed; }
        .status-msg { font-size: 0.85em; color: #666; margin-top: -10px; margin-bottom: 15px; }
        .result-box { margin-top: 20px; padding: 15px; background: #e2f0d9; border-radius: 4px; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .result-row:last-child { margin-bottom: 0; }
        .total { font-weight: bold; border-bottom: 1px dashed #777; padding-bottom: 5px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Live Formula Calculator</h2>
    <p>Formula: <code>((X - Y) / X) * Amount</code></p>
    
    <div class="input-group">
        <label for="xValue">Value of X (Live INR to IDR Rate):</label>
        <input type="number" id="xValue" readonly placeholder="Fetching live rate...">
        <div id="status" class="status-msg">Connecting to live exchange data...</div>
    </div>
    <div class="input-group">
        <label for="yValue">Value of Y:</label>
        <input type="number" id="yValue" oninput="calculate()">
    </div>
    <div class="input-group">
        <label for="amount">Amount:</label>
        <input type="number" id="amount" oninput="calculate()">
    </div>

    <div class="result-box">
        <div class="result-row total">
            <span>Total Result:</span>
            <span id="output">0</span>
        </div>
        <div class="result-row">
            <span>A Share (60%):</span>
            <span id="aShare">0</span>
        </div>
        <div class="result-row">
            <span>S Share (40%):</span>
            <span id="sShare">0</span>
        </div>
    </div>
</div>

<script>
// Automatically fetch live conversion rate on page load
window.addEventListener('DOMContentLoaded', (event) => {
    fetchLiveRate();
});

function fetchLiveRate() {
    // Using a reliable open-source exchange rate API endpoint
    fetch('https://open.er-api.com/v6/latest/INR')
        .then(response => response.json())
        .then(data => {
            if (data && data.rates && data.rates.IDR) {
                const idrRate = data.rates.IDR;
                document.getElementById('xValue').value = idrRate;
                document.getElementById('status').innerText = "Live rate updated successfully.";
                document.getElementById('status').style.color = "green";
                calculate(); // Trigger an initial calculation in case Y and Amount are pre-filled
            } else {
                throw new Error("Invalid rate data structure");
            }
        })
        .catch(error => {
            console.error('Error fetching exchange rate:', error);
            document.getElementById('status').innerText = "Failed to load live rate. Please enter manually.";
            document.getElementById('status').style.color = "red";
            document.getElementById('xValue').removeAttribute('readonly'); // fallback to manual edit if API fails
        });
}

function calculate() {
    const x = parseFloat(document.getElementById('xValue').value);
    const y = parseFloat(document.getElementById('yValue').value);
    const amount = parseFloat(document.getElementById('amount').value);

    const outputEl = document.getElementById('output');
    const aShareEl = document.getElementById('aShare');
    const sShareEl = document.getElementById('sShare');

    if (!isNaN(x) && !isNaN(y) && !isNaN(amount) && y !== 0) {
        const result = ((x - y) / x) * amount;
        
        const aShare = result * 0.60;
        const sShare = result * 0.40;

        outputEl.innerText = result.toFixed(2);
        aShareEl.innerText = aShare.toFixed(2);
        sShareEl.innerText = sShare.toFixed(2);
    } else if (y === 0) {
        outputEl.innerText = "Y cannot be zero";
        aShareEl.innerText = "0";
        sShareEl.innerText = "0";
    } else {
        outputEl.innerText = "0";
        aShareEl.innerText = "0";
        sShareEl.innerText = "0";
    }
}
</script>

</body>
</html>
