<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live INR-IDR Formula Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .calculator { max-width: 400px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        input[readonly] { background-color: #e9ecef; color: #495057; cursor: not-allowed; }
        .status-msg { font-size: 0.85em; color: #666; margin-top: -10px; margin-bottom: 15px; }
        .source-tag { font-size: 0.75em; font-weight: bold; padding: 2px 6px; border-radius: 3px; margin-left: 6px; }
        .source-google { background: #e8f0fe; color: #1a73e8; }
        .source-fallback { background: #fff3cd; color: #856404; }
        .result-box { margin-top: 20px; padding: 15px; background: #e2f0d9; border-radius: 4px; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .result-row:last-child { margin-bottom: 0; }
        .total { font-weight: bold; border-bottom: 1px dashed #777; padding-bottom: 5px; margin-bottom: 8px; }
        button.refresh-btn { margin-top: 8px; padding: 6px 12px; border: 1px solid #1a73e8; background: white; color: #1a73e8; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
        button.refresh-btn:hover { background: #e8f0fe; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Live Formula Calculator</h2>
    <p>Formula: <code>((X - Y) / Y) * Amount</code></p>

    <div class="input-group">
        <label for="xValue">Value of X (Live INR to IDR Rate): <span id="sourceTag"></span></label>
        <input type="number" id="xValue" readonly placeholder="Fetching live rate...">
        <div id="status" class="status-msg">Connecting to live exchange data...</div>
        <button class="refresh-btn" onclick="fetchLiveRate()">Refresh rate</button>
    </div>
    <div class="input-group">
        <label for="yValue">Value of Y:</label>
        <input type="number" id="yValue" oninput="calculate()">
    </div>
    <div class="input-group">
        <label for="amount">Amount:</label>
        <input type="number" id="amount" oninput="calculate()">
    </div>

    <div class="result-box">
        <div class="result-row total">
            <span>Total Result:</span>
            <span id="output">0</span>
        </div>
        <div class="result-row">
            <span>A Share (60%):</span>
            <span id="aShare">0</span>
        </div>
        <div class="result-row">
            <span>S Share (40%):</span>
            <span id="sShare">0</span>
        </div>
    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    fetchLiveRate();
});

function setStatus(msg, color) {
    const s = document.getElementById('status');
    s.innerText = msg;
    s.style.color = color;
}

function setSourceTag(label, cls) {
    const tag = document.getElementById('sourceTag');
    tag.innerText = label;
    tag.className = 'source-tag ' + cls;
}

async function fetchLiveRate() {
    setStatus('Connecting to live exchange data...', '#666');
    setSourceTag('', '');
    document.getElementById('xValue').setAttribute('readonly', true);

    // 1) Try Google Finance quote page (scraped via a public CORS proxy, since
    //    Google does not expose an official free exchange-rate API).
    try {
        const rate = await fetchFromGoogleFinance();
        if (rate && !isNaN(rate) && rate > 0) {
            document.getElementById('xValue').value = rate;
            setStatus('Live rate updated from Google Finance.', 'green');
            setSourceTag('Google Finance', 'source-google');
            calculate();
            return;
        }
        throw new Error('Google Finance parse failed');
    } catch (err) {
        console.warn('Google Finance fetch failed, falling back:', err);
    }

    // 2) Fallback to open.er-api.com
    try {
        const response = await fetch('https://open.er-api.com/v6/latest/INR');
        const data = await response.json();
        if (data && data.rates && data.rates.IDR) {
            document.getElementById('xValue').value = data.rates.IDR;
            setStatus('Google Finance unavailable — using fallback rate source.', '#856404');
            setSourceTag('Fallback API', 'source-fallback');
            calculate();
            return;
        }
        throw new Error('Invalid rate data structure');
    } catch (error) {
        console.error('Error fetching exchange rate:', error);
        setStatus('Both sources failed. Please enter the rate manually.', 'red');
        setSourceTag('Manual entry', 'source-fallback');
        document.getElementById('xValue').removeAttribute('readonly');
    }
}

async function fetchFromGoogleFinance() {
    // Google Finance has no official API. This scrapes the public quote page
    // through a CORS proxy and parses the rate out of the HTML. This is
    // inherently fragile: it depends on Google's page markup and on the
    // proxy's availability, and can break without notice.
    const targetUrl = 'https://www.google.com/finance/quote/INR-IDR';
    const proxyUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(targetUrl);

    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error('Proxy request failed: ' + response.status);
    const html = await response.text();

    // Google Finance renders the price inside an element with class "YMlKec fxKbKc"
    const match = html.match(/class="YMlKec fxKbKc">([\d.,]+)</);
    if (!match) throw new Error('Rate element not found in page');

    const rateStr = match[1].replace(/,/g, '');
    return parseFloat(rateStr);
}

function calculate() {
    const x = parseFloat(document.getElementById('xValue').value);
    const y = parseFloat(document.getElementById('yValue').value);
    const amount = parseFloat(document.getElementById('amount').value);

    const outputEl = document.getElementById('output');
    const aShareEl = document.getElementById('aShare');
    const sShareEl = document.getElementById('sShare');

    if (!isNaN(x) && !isNaN(y) && !isNaN(amount) && y !== 0) {
        const result = ((x - y) / y) * amount;

        const aShare = result * 0.60;
        const sShare = result * 0.40;

        outputEl.innerText = result.toFixed(2);
        aShareEl.innerText = aShare.toFixed(2);
        sShareEl.innerText = sShare.toFixed(2);
    } else if (y === 0) {
        outputEl.innerText = "Y cannot be zero";
        aShareEl.innerText = "0";
        sShareEl.innerText = "0";
    } else {
        outputEl.innerText = "0";
        aShareEl.innerText = "0";
        sShareEl.innerText = "0";
    }
}
</script>

</body>
</html>
