<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live INR to IDR Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f9; color: #333; }
        .calculator { max-width: 450px; margin: 0 auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        input:disabled { background-color: #e9e9e9; color: #666; }
        .btn-fetch { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 15px; }
        .btn-fetch:hover { background: #0056b3; }
        .status { font-size: 0.85em; color: #666; margin-bottom: 15px; text-align: center; }
        .result-box { margin-top: 20px; padding: 15px; background: #e2f0d9; border-radius: 4px; border: 1px solid #b8e2a2; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.05em; }
        .result-row:last-child { margin-bottom: 0; }
        .total { font-weight: bold; border-bottom: 1px dashed #777; padding-bottom: 5px; margin-bottom: 8px; font-size: 1.2em; }
        code { background: #eee; padding: 2px 4px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Live Rate Splitter</h2>
    <p style="font-size:0.85em; color:#555;">Formula: <code>((X - Y) / Y) * Amount</code></p>
    
    <button class="btn-fetch" onclick="fetchLiveRates()">🔄 Fetch Latest Live Rates</button>
    <div class="status" id="statusMessage">Rates: Click fetch to load live data.</div>

    <div class="input-group">
        <label for="xValue">Value of X (Live Google/Market INR → IDR):</label>
        <input type="number" id="xValue" step="any" oninput="calculate()">
    </div>
    <div class="input-group">
        <label for="yValue">Value of Y (Estimated Western Union INR → IDR):</label>
        <input type="number" id="yValue" step="any" oninput="calculate()">
    </div>
    <div class="input-group">
        <label for="amount">Amount:</label>
        <input type="number" id="amount" value="1000" oninput="calculate()">
    </div>

    <div class="result-box">
        <div class="result-row total">
            <span>Total Result:</span>
            <span id="output">0.00</span>
        </div>
        <div class="result-row">
            <span>A Share (60%):</span>
            <span id="aShare">0.00</span>
        </div>
        <div class="result-row">
            <span>S Share (40%):</span>
            <span id="sShare">0.00</span>
        </div>
    </div>
</div>

<script>
// Automatically fetch rates when the page loads
window.onload = function() {
    fetchLiveRates();
};

async function fetchLiveRates() {
    const statusMessage = document.getElementById('statusMessage');
    statusMessage.innerText = "Fetching live rates...";
    
    try {
        // Fetching real-time market rate using a free, no-auth currency API
        const response = await fetch('https://open.er-api.com/v6/latest/INR');
        if (!response.ok) throw new Error('Network response error');
        
        const data = await response.json();
        
        // Target currency is IDR (Indonesian Rupiah)
        const liveX = data.rates.IDR; 
        
        if (liveX) {
            // Western Union rates typically carry a ~0.7% retail margin spread compared to market mid-rate
            const estimatedY = liveX * 0.993; 

            document.getElementById('xValue').value = liveX.toFixed(4);
            document.getElementById('yValue').value = estimatedY.toFixed(4);
            
            statusMessage.style.color = "green";
            statusMessage.innerText = "Rates updated successfully live!";
            calculate();
        } else {
            throw new Error('IDR data not found');
        }
    } catch (error) {
        console.error(error);
        statusMessage.style.color = "red";
        statusMessage.innerText = "Failed to load live rates automatically. Please enter values manually.";
    }
}

function calculate() {
    const x = parseFloat(document.getElementById('xValue').value);
    const y = parseFloat(document.getElementById('yValue').value);
    const amount = parseFloat(document.getElementById('amount').value);

    const outputEl = document.getElementById('output');
    const aShareEl = document.getElementById('aShare');
    const sShareEl = document.getElementById('sShare');

    if (!isNaN(x) && !isNaN(y) && !isNaN(amount) && y !== 0) {
        const result = ((x - y) / y) * amount;
        
        const aShare = result * 0.60;
        const sShare = result * 0.40;

        outputEl.innerText = result.toFixed(2);
        aShareEl.innerText = aShare.toFixed(2);
        sShareEl.innerText = sShare.toFixed(2);
    } else if (y === 0) {
        outputEl.innerText = "Y cannot be 0";
        aShareEl.innerText = "0.00";
        sShareEl.innerText = "0.00";
    } else {
        outputEl.innerText = "0.00";
        aShareEl.innerText = "0.00";
        sShareEl.innerText = "0.00";
    }
}
</script>

</body>
</html>
